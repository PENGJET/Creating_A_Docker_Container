on: [push]

jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    name: A job to say hello
    steps:
      # To use this repository's action, we must check out the code first
      - name: Checkout
        uses: actions/checkout@v4

      # This points to the action in the root directory of your repo
      - name: Hello world action step
        id: hello
        uses: ./ 
        with:
          who-to-greet: 'Mona the Octocat'

      # This reads the output variable generated by entrypoint.sh
      - name: Get the output time
        run: echo "The time was ${{ steps.hello.outputs.time }}"